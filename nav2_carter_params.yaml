# =============================================================================
# Nav2 Parameters — MAXIMUM SPEED v11b — CANARY: raven_gold_91
# Platform: Isaac ROS Nova Carter (Differential Drive, Segway RMP Lite 220)
# =============================================================================
#
# RESEARCH-BACKED CHANGES (sources cited inline):
#
# [FIX-1] COSTMAP/HORIZON/PRUNE CONSISTENCY — THE #1 SPEED LIMITER
#   Official docs: "The Path Follow critic cannot drive velocities greater
#   than the projectable distance of that velocity on the available path
#   on the rolling costmap." (configuring-mppic.html)
#   GitHub issue #4970: Robot stuck at 0.5 m/s because costmap/prune too small.
#   ROS Answers 414931: "prune_dist set to 3.5 means only 3.5m of path...
#   that could easily be the cause" — Steve Macenski
#
#   MATH: prediction_horizon = time_steps * model_dt = 56 * 0.05 = 2.8s
#         max_projection = vx_max * horizon = 2.0 * 2.8 = 5.6m
#         REQUIRED: local_costmap_radius >= 5.6m → costmap >= 12m wide ✓ (16m)
#         REQUIRED: prune_distance >= 5.6m → FIXED from 5.0 to 8.0
#
# [FIX-2] vx_std MUST SCALE WITH vx_max
#   Official docs: "The faster the robot is set to go, the higher the
#   velocity sampling standard deviations should be in order to
#   effectively explore the velocity space."
#   At vx_max=2.0, vx_std=0.2 means 95% of samples within ±0.4 of current
#   velocity — only 20% of the 2.0 range. Robot takes forever to explore
#   higher speeds. FIXED: vx_std=0.4 (adequate exploration without jitter)
#
# [FIX-3] PathFollowCritic offset_from_furthest MISCALCULATED
#   Official docs formula: prediction_horizon * max_speed / path_res / 3.0
#   = 2.8 * 2.0 / 0.05 / 3.0 = 37. Was set to 10 — MASSIVELY undersized.
#   "If set absurdly low (e.g. 5) it can trigger when a robot is simply
#   trying to start path tracking causing suboptimal behaviors."
#   FIXED: 30 (slightly below formula to leave margin)
#
# [FIX-4] PathAlignCritic offset_from_furthest MISCALCULATED
#   Same formula applies. Was 20, now 30.
#
# [FIX-5] threshold_to_consider VALUES FOR CLEAN HANDOFF
#   Official docs: "Setting the threshold for consideration in the path
#   follower + goal critics as the same as your prediction horizon can
#   make sure you have clean hand-offs between them."
#   PathFollow threshold was 1.4 — far too small, causes premature slowdown.
#   FIXED: PathFollowCritic threshold = 2.8 (= prediction horizon distance)
#          GoalCritic threshold = 2.8 (matches horizon for clean handoff)
#
# [FIX-6] ObstaclesCritic repulsion_weight TOO HIGH FOR inflation_radius
#   Official docs: "Higher radii should correspond to reduced repulsion_weight
#   due to the penalty formation (inflation_radius - min_dist_to_obstacle).
#   If this penalty is too high, the robot will slow significantly when
#   entering cost-space from non-cost space."
#   Default tuned for small AMRs. Carter is larger. FIXED: 0.6
#
# [FIX-7] MPPI ACCELERATION LIMITS (ax_max, ax_min, az_max)
#   Added in Jazzy via PR #4352. Without explicit values, defaults may
#   limit trajectory feasibility. Set high to not artificially constrain.
#   Note from PR: "Lowering acceleration limits causes the robot to sway,
#   stutter...this behavior can be observed from around <1.0 m/s^2.
#   Above 2 m/s^2 should be fine."
#
# =============================================================================

bt_navigator:
  ros__parameters:
    use_sim_time: True
    global_frame: map
    robot_base_frame: base_link
    bt_loop_duration: 10
    default_server_timeout: 20
    odom_topic: /chassis/odom
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    default_nav_to_pose_bt_xml: "/workspaces/isaac_ros-dev/nav2_bt_carter.xml"
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: True

# =============================================================================
# Controller Server — MPPI (research-optimized for max speed)
# =============================================================================
controller_server:
  ros__parameters:
    use_sim_time: True
    # 20 Hz passes MPPI startup check (model_dt=0.05 == 1/20).
    # Actually runs at ~15 Hz at 0.5× RTF — acceptable mismatch.
    controller_frequency: 20.0
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3
      movement_time_allowance: 20.0
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.5
      yaw_goal_tolerance: 0.5
      stateful: True
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"

      # --- Prediction horizon ---
      # 56 * 0.05 = 2.8s. At 2.0 m/s = 5.6m projection.
      # model_dt=0.05 with 56 steps = finer trajectory resolution.
      # controller_frequency lowered to 10 Hz to avoid missed-rate warnings
      # AND to make model_dt < controller_period (0.05 < 0.1) — preventing
      # the "Controller period is less than model dt" warning.
      time_steps: 56
      model_dt: 0.05
      batch_size: 2000

      # --- Velocity limits ---
      vx_max: 2.0
      vx_min: -0.5
      wz_max: 1.9

      # --- [FIX-2] Sampling noise — moderate exploration ---
      # 0.6 std at vx_max=2.0: 95% within ±1.2 of current velocity.
      # NOT 0.8 (causes trajectory cancellation in weighted avg).
      # NOT 0.4 (too narrow, takes many cycles to explore higher speeds).
      vx_std: 0.5
      wz_std: 0.4

      # --- [FIX-7] Acceleration limits (Jazzy+) ---
      # Set high so MPPI doesn't artificially limit trajectory feasibility.
      # The velocity_smoother downstream handles actual hardware limits.
      ax_max: 3.5
      ax_min: -3.5
      az_max: 3.5

      iteration_count: 1

      # --- [FIX-1] prune_distance must exceed max projection ---
      # max_projection = 2.0 * 2.8 = 5.6m. Set to 8.0 for margin.
      # Steve Macenski on ROS Answers: "prune_dist set to 3.5...that means
      # only 3.5m of the path is going to be taken to try to align or
      # control in context to. If your costmap is actually much larger and
      # you want to move much faster, that could be easily the cause."
      prune_distance: 8.0

      transform_tolerance: 0.1

      # [FIX-8] temperature=0.1 was THE #1 speed bottleneck!
      # Source code analysis: low temp exponentially down-weights any
      # trajectory that costs slightly more than current best. Once the
      # optimizer converges on ~0.4 m/s, it can't escape to explore faster
      # solutions. 0.3 = default, allows proper exploration while still
      # favoring good trajectories.
      temperature: 0.3
      gamma: 0.015
      motion_model: "DiffDrive"
      visualize: false
      regenerate_noises: false

      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3

      # --- v10: v7 critics + temperature fix ---
      # Key change: temperature 0.1→0.3 (escape speed local minimum)
      # Source code analysis showed PathAlignCritic is speed-neutral (mean norm),
      # PathAngleCritic has early-exit for aligned heading. Both safe to keep.
      critics:
        - "ConstraintCritic"
        - "CostCritic"
        - "GoalCritic"
        - "GoalAngleCritic"
        - "PathAlignCritic"
        - "PathFollowCritic"
        - "PathAngleCritic"
        - "PreferForwardCritic"

      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0

      CostCritic:
        enabled: true
        cost_power: 1
        # Very low weight — just enough for basic obstacle avoidance.
        # PathFollowCritic at 50 dominates.
        cost_weight: 0.5
        critical_cost: 300.0
        consider_footprint: false
        collision_cost: 1000000.0
        near_goal_distance: 0.5
        # trajectory_point_step: evaluate every Nth step to reduce accumulation
        trajectory_point_step: 4

      GoalCritic:
        enabled: true
        cost_power: 1
        # Lower weight = less aggressive deceleration approaching goal.
        # Robot carries more speed and overshoots slightly — as requested.
        cost_weight: 2.0
        # [FIX-5] Match prediction horizon for clean handoff.
        threshold_to_consider: 2.8

      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        threshold_to_consider: 0.5

      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5

      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        threshold_to_consider: 0.5
        offset_from_furthest: 4
        max_angle_to_furthest: 1.0

      PathAlignCritic:
        enabled: true
        cost_power: 1
        # Low weight = allows cutting corners for racing lines
        cost_weight: 0.5
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 3
        threshold_to_consider: 0.8
        # [FIX-4] Proper calculation for 2.0 m/s
        offset_from_furthest: 30
        use_path_orientations: false

      PathFollowCritic:
        enabled: true
        cost_power: 1
        # THE biggest speed lever per ROS Answers #414931.
        # MASSIVE weight to dominate all other critics.
        cost_weight: 50.0
        # [FIX-3] Proper calculation: ~30% of max projection points
        offset_from_furthest: 30
        # [FIX-5] Match prediction horizon for clean handoff.
        # Prevents premature deceleration when approaching goal.
        threshold_to_consider: 2.8

# =============================================================================
# Local Costmap — sized for 2.0 m/s + 2.8s horizon
# =============================================================================
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: True
      footprint_padding: 0.03
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      # [FIX-1] Costmap must be >= 2 * max_projection = 2 * 5.6 = 11.2m
      # 16m provides comfortable margin and room for the path ahead.
      width: 16
      height: 16
      resolution: 0.05
      transform_tolerance: 0.5
      footprint: "[ [0.14, 0.25], [0.14, -0.25], [-0.607, -0.25], [-0.607, 0.25] ]"
      mark_threshold: 2
      always_send_full_costmap: True
      plugins: ['voxel_layer', 'inflation_layer']
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        observation_sources: lidar
        publish_voxel_map: False
        z_voxels: 10
        z_resolution: 0.2
        origin_z: 0.0
        max_obstacle_height: 2.0
        mark_threshold: 0
        lidar:
          topic: /front_3d_lidar/lidar_points
          data_type: PointCloud2
          marking: True
          clearing: True
          obstacle_max_range: 10.0
          obstacle_min_range: 0.3
          raytrace_max_range: 12.0
          raytrace_min_range: 0.3
          max_obstacle_height: 2.0
          min_obstacle_height: 0.15
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: True
        # Inflation must be >= circumscribed_radius (0.696m) for planner.
        # STEEP falloff (10.0) = costs drop to near-zero by 0.5m from
        # obstacle. This eliminates the "always in cost-space" problem
        # that slows MPPI in warehouse aisles.
        cost_scaling_factor: 10.0
        inflation_radius: 0.75

# =============================================================================
# Global Costmap
# =============================================================================
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: True
      footprint_padding: 0.03
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      rolling_window: true
      width: 30
      height: 30
      resolution: 0.05
      transform_tolerance: 0.5
      footprint: "[ [0.14, 0.25], [0.14, -0.25], [-0.607, -0.25], [-0.607, 0.25] ]"
      track_unknown_space: false
      mark_threshold: 2
      always_send_full_costmap: False
      plugins: ['voxel_layer', 'inflation_layer']
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        observation_sources: lidar
        publish_voxel_map: False
        z_voxels: 10
        z_resolution: 0.2
        origin_z: 0.0
        max_obstacle_height: 2.0
        mark_threshold: 0
        lidar:
          topic: /front_3d_lidar/lidar_points
          data_type: PointCloud2
          marking: True
          clearing: True
          obstacle_max_range: 10.0
          obstacle_min_range: 0.3
          raytrace_max_range: 12.0
          raytrace_min_range: 0.3
          max_obstacle_height: 2.0
          min_obstacle_height: 0.15
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: True
        cost_scaling_factor: 3.0
        inflation_radius: 0.85

# =============================================================================
# Planner Server — Smac Hybrid-A* (fast paths)
# =============================================================================
planner_server:
  ros__parameters:
    use_sim_time: True
    expected_planner_frequency: 2.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner::SmacPlannerHybrid"
      downsample_costmap: false
      downsampling_factor: 1
      tolerance: 0.25
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 3.5
      motion_model_for_search: "REEDS_SHEPP"
      angle_quantization_bins: 72
      analytic_expansion_ratio: 3.5
      # Longer analytic expansions = more shortcuts to goal
      analytic_expansion_max_length: 3.0
      # Small radius — diff-drive can turn nearly in place.
      # With REEDS_SHEPP, this enables very tight forward arcs.
      minimum_turning_radius: 0.10
      # HIGH penalty forces planner to use forward arcs + tight turns
      # instead of reverse segments. Diff-drive can spin in place,
      # so reverse maneuvers are never needed.
      reverse_penalty: 100.0
      change_penalty: 0.0
      non_straight_penalty: 1.2
      # Low cost penalty = planner cuts through mild inflation
      # zones for shorter, faster paths
      cost_penalty: 2.0
      retrospective_penalty: 0.015
      lookup_table_size: 20.0
      cache_obstacle_heuristic: false
      debug_visualizations: false
      use_quadratic_cost_penalty: False
      downsample_obstacle_heuristic: True
      allow_primitive_interpolation: False
      smooth_path: True
      smoother:
        max_iterations: 1000
        # Heavy smoothing = smoother curves = higher cornering speed
        w_smooth: 0.4
        w_data: 0.2
        tolerance: 1.0e-10
        do_refinement: true
        refinement_num: 2

# =============================================================================
# Smoother Server
# =============================================================================
smoother_server:
  ros__parameters:
    use_sim_time: True
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

# =============================================================================
# Behavior Server (Recovery)
# =============================================================================
behavior_server:
  ros__parameters:
    use_sim_time: True
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.5
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

# =============================================================================
# Robot State Publisher
# =============================================================================
robot_state_publisher:
  ros__parameters:
    use_sim_time: True

# =============================================================================
# Waypoint Follower
# =============================================================================
waypoint_follower:
  ros__parameters:
    use_sim_time: True
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

# =============================================================================
# Velocity Smoother — final hardware gate
# =============================================================================
velocity_smoother:
  ros__parameters:
    use_sim_time: True
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [2.0, 0.0, 1.9]
    min_velocity: [-0.5, 0.0, -1.9]
    # High accel = fast ramp to top speed. 3.5 m/s² → 0 to 2.0 in 0.57s.
    # If you see wheel slip, lower to 2.5.
    max_accel: [3.5, 0.0, 3.5]
    max_decel: [-3.5, 0.0, -3.5]
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0